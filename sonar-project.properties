# Identificador del proyecto (debe coincidir con el Project key que
# crees en SonarQube, paso 6.1 del PDF).
sonar.projectKey=pokie_iac
sonar.projectName=Pokie Cat
sonar.projectVersion=1.0

# Organizacion en SonarCloud (requerido solo para el analisis en la nube;
# no afecta el uso local con Docker, que no tiene este concepto).
sonar.organization=eddycarranza

# Código fuente a analizar: backend (Node/Express), frontend (React) y la
# infraestructura como código en Terraform.
sonar.sources=backend/src,frontend/src,iac/tf

# Carpetas que no se deben analizar (dependencias, builds, artefactos).
sonar.exclusions=**/node_modules/**,**/build/**,**/.terraform/**,**/.build/**,**/*.zip

sonar.sourceEncoding=UTF-8

# El código de infraestructura (Terraform) no se mide con cobertura de tests
# unitarios como el código de aplicación. El proyecto tampoco tiene una suite
# de tests automatizados todavía, así que se excluye todo del cálculo de
# coverage para que el Quality Gate no falle por una métrica que no se está
# usando en este proyecto (pendiente: agregar tests reales más adelante).
sonar.coverage.exclusions=iac/tf/**,backend/src/**,frontend/src/**

# URL del servidor SonarQube local, levantado con Docker Compose.
sonar.host.url=http://localhost:9000
