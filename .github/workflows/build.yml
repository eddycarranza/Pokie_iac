name: CI/CD Pipeline — Pokie Cat

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:

  # ── 1. PRUEBAS UNITARIAS ──────────────────────────────────
  test:
    name: Pruebas Unitarias (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias del backend
        run: npm ci
        working-directory: backend

      - name: Ejecutar tests unitarios
        run: npm test
        working-directory: backend

  # ── 2. ANÁLISIS DE CÓDIGO — SONARCLOUD ───────────────────
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Verificar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        continue-on-error: true
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ── 3. CHECKOV — ESCANEO DE INFRAESTRUCTURA COMO CÓDIGO ──
  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov IaC Scan — Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac/tf
          framework: terraform
          soft_fail: true
          output_format: cli

  # ── 4. TERRAFORM PLAN ────────────────────────────────────
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [checkov]
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform Init
        working-directory: iac/tf
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Terraform Validate
        working-directory: iac/tf
        run: terraform validate

      - name: Terraform Plan
        working-directory: iac/tf
        run: terraform plan -no-color
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

  # ── 5. BUILD & PUSH — GHCR ───────────────────────────────
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [test, checkov, sonarqube]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadatos (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pokiecat-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build y push de la imagen
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REACT_APP_API_URL=${{ vars.REACT_APP_API_URL || 'https://c2vrizv03g.execute-api.us-east-1.amazonaws.com/prod' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
