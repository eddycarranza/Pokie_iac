name: SonarCloud Analysis

# Se ejecuta automáticamente en cada push o pull request hacia main,
# y también se puede disparar manualmente desde la pestaña Actions.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sonarcloud:
    name: Análisis de calidad con SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4
        with:
          # Necesario para que SonarCloud pueda calcular el "código nuevo"
          # comparando contra el historial completo de commits.
          fetch-depth: 0

      - name: Ejecutar el análisis de SonarCloud
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
