- name: Clonar repositorio de Pokie Cat
  git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    version: main
    force: yes

- name: Crear archivo .env con las variables de entorno
  template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    mode: "0600"

- name: Levantar la aplicación con Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present
    build: always

- name: Verificar que el backend responde
  uri:
    url: "http://localhost:4000/health"
    method: GET
    status_code: 200
  retries: 5
  delay: 5
