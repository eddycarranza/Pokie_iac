- name: Agregar clave GPG oficial de Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Agregar repositorio de Docker
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Instalar Docker Engine y plugin Compose
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Iniciar y habilitar servicio Docker
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Agregar usuario ubuntu al grupo docker
  user:
    name: ubuntu
    groups: docker
    append: yes
