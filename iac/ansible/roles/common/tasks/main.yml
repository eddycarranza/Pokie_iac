- name: Actualizar lista de paquetes
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Instalar paquetes base
  apt:
    name:
      - git
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
      - ufw
    state: present

- name: Configurar firewall — permitir SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Configurar firewall — permitir frontend (3000)
  ufw:
    rule: allow
    port: "3000"
    proto: tcp

- name: Configurar firewall — permitir backend (4000)
  ufw:
    rule: allow
    port: "4000"
    proto: tcp

- name: Activar firewall
  ufw:
    state: enabled
    policy: deny
